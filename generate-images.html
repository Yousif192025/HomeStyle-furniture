<!DOCTYPE html>
<html>
<head>
    <title>توليد صور الأثاث - HomeStyle</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; direction: rtl; }
        button { background: #C49A6C; color: white; padding: 10px 20px; margin: 10px; border: none; cursor: pointer; }
        .image-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-top: 30px; }
        .image-card img { width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>مولد صور الأثاث الاحترافية</h1>
    <p>انقر على الزر لإنشاء 12 صورة معرض + 4 صور مشاريع بصيغة WebP</p>
    <button id="generateBtn">▶ توليد الصور وحفظها</button>
    <div id="output" class="image-grid"></div>

    <script>
        // ألوان وتصاميم مختلفة لتبدو كأثاث حقيقي
        const galleryStyles = [
            { bg: "#F9F6F0", text: "غرفة نوم مودرن", icon: "🛏️" },
            { bg: "#E8DCC8", text: "كنب أنيق", icon: "🛋️" },
            { bg: "#D4C4A8", text: "طعام فاخر", icon: "🍽️" },
            { bg: "#C49A6C", text: "مكتب منزلي", icon: "📚" },
            { bg: "#A8B5C4", text: "ديكور غرفة", icon: "🖼️" },
            { bg: "#8CA5B5", text: "خزانة ملابس", icon: "🚪" },
            { bg: "#6B8E7B", text: "زاوية مريحة", icon: "🪑" },
            { bg: "#D4A373", text: "إضاءة عصرية", icon: "💡" },
            { bg: "#FAEDCD", text: "سجادة فاخرة", icon: "🔲" },
            { bg: "#CCD5AE", text: "طاولة جانبية", icon: "🪵" },
            { bg: "#E3D5CA", text: "مرآة زينة", icon: "🪞" },
            { bg: "#B5838D", text: "ستائر حرير", icon: "🪟" }
        ];
        
        const projectStyles = [
            { bg: "#1E2A38", text: "فيلا الشاطئ - غرفة معيشة مودرن", icon: "🏖️" },
            { bg: "#2C3E50", text: "قصر اليمامة - دريسنج روم فاخر", icon: "👑" },
            { bg: "#34495E", text: "شقة العليا - طقم سفرة زجاج", icon: "🍷" },
            { bg: "#3D5A80", text: "استراحة الساحل - ركنة زاوية مودرن", icon: "🌊" }
        ];

        function downloadImage(dataUrl, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = dataUrl;
            link.click();
        }

        async function generateAndDownload() {
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = '<p>جاري توليد الصور...</p>';
            
            // توليد صور المعرض (12 صورة)
            for (let i = 0; i < galleryStyles.length; i++) {
                const style = galleryStyles[i];
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 600;
                const ctx = canvas.getContext('2d');
                
                // رسم خلفية جميلة
                ctx.fillStyle = style.bg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // رسم نقشة بسيطة كخلفية
                ctx.fillStyle = "#FFFFFF30";
                for(let j=0; j<100; j++) {
                    ctx.beginPath();
                    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*5, 0, 2*Math.PI);
                    ctx.fill();
                }
                
                // رسم أيقونة كبيرة
                ctx.font = "bold 120px 'Segoe UI Emoji'";
                ctx.fillStyle = "#FFFFFF80";
                ctx.fillText(style.icon, canvas.width/2-60, canvas.height/2);
                
                // رسم مربع نص في المنتصف
                ctx.fillStyle = "#FFFFFFCC";
                ctx.fillRect(canvas.width/4, canvas.height-100, canvas.width/2, 60);
                
                ctx.font = "bold 24px 'Cairo', 'Segoe UI'";
                ctx.fillStyle = "#1E2A38";
                ctx.textAlign = "center";
                ctx.fillText(style.text, canvas.width/2, canvas.height-60);
                
                const dataUrl = canvas.toDataURL('image/webp');
                downloadImage(dataUrl, `gallery-${String(i+1).padStart(2,'0')}.webp`);
                await new Promise(r => setTimeout(r, 300)); // تأخير بسيط بين الصور
            }
            
            // توليد صور المشاريع (4 صور)
            for (let i = 0; i < projectStyles.length; i++) {
                const style = projectStyles[i];
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 600;
                const ctx = canvas.getContext('2d');
                
                // تدرج لوني جميل
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, style.bg);
                gradient.addColorStop(1, "#00000040");
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // رسم أيقونة المشروع
                ctx.font = "bold 150px 'Segoe UI Emoji'";
                ctx.fillStyle = "#FFFFFF80";
                ctx.fillText(style.icon, canvas.width/2-75, canvas.height/2);
                
                // نص المشروع
                ctx.fillStyle = "#FFFFFF";
                ctx.font = "bold 28px 'Cairo'";
                ctx.textAlign = "center";
                ctx.fillText(style.text, canvas.width/2, canvas.height-80);
                
                const dataUrl = canvas.toDataURL('image/webp');
                downloadImage(dataUrl, `project-${i+1}.webp`);
                await new Promise(r => setTimeout(r, 300));
            }
            
            outputDiv.innerHTML = '<h2>✅ تم التوليد!</h2><p>سيتم تحميل 16 صورة (12 للمعرض + 4 للمشاريع). تأكد من وضعها في المجلدات الصحيحة:</p><ul><li>assets/images/gallery/</li><li>assets/images/projects/</li></ul>';
        }
        
        document.getElementById('generateBtn').addEventListener('click', generateAndDownload);
    </script>
</body>
</html>
