<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مولد صور الأثاث الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f4f9; text-align: center; padding: 20px; }
        .controls { margin-bottom: 30px; }
        button { background: #C49A6C; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; transition: 0.3s; }
        button:hover { background: #a67d50; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .image-card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .image-card img { width: 100%; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>مولد صور الأثاث الاحترافية</h1>
    <p>سيتم عرض الصور ومعاينة التحميل التلقائي</p>
    
    <div class="controls">
        <button id="generateBtn">🚀 توليد وتحميل جميع الصور</button>
    </div>

    <div id="output" class="image-grid"></div>

    <script>
        const items = [
            { bg: "#F9F6F0", text: "غرفة نوم مودرن", icon: "🛏️" }, { bg: "#E8DCC8", text: "كنب أنيق", icon: "🛋️" },
            { bg: "#D4C4A8", text: "طعام فاخر", icon: "🍽️" }, { bg: "#C49A6C", text: "مكتب منزلي", icon: "📚" },
            { bg: "#A8B5C4", text: "ديكور غرفة", icon: "🖼️" }, { bg: "#8CA5B5", text: "خزانة ملابس", icon: "🚪" },
            { bg: "#6B8E7B", text: "زاوية مريحة", icon: "🪑" }, { bg: "#D4A373", text: "إضاءة عصرية", icon: "💡" },
            { bg: "#FAEDCD", text: "سجادة فاخرة", icon: "🔲" }, { bg: "#CCD5AE", text: "طاولة جانبية", icon: "🪵" },
            { bg: "#E3D5CA", text: "مرآة زينة", icon: "🪞" }, { bg: "#B5838D", text: "ستائر حرير", icon: "🪟" }
        ];

        function downloadFile(url, name) {
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            a.click();
        }

        async function generate() {
            const output = document.getElementById('output');
            output.innerHTML = '';
            
            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const canvas = document.createElement('canvas');
                canvas.width = 800; canvas.height = 600;
                const ctx = canvas.getContext('2d');
                
                // رسم التصميم
                ctx.fillStyle = item.bg;
                ctx.fillRect(0, 0, 800, 600);
                ctx.font = "150px Arial";
                ctx.textAlign = "center";
                ctx.fillStyle = "rgba(255,255,255,0.5)";
                ctx.fillText(item.icon, 400, 350);
                ctx.fillStyle = "#333";
                ctx.font = "bold 35px 'Cairo'";
                ctx.fillText(item.text, 400, 500);
                
                const dataUrl = canvas.toDataURL('image/webp');
                
                // عرض الصورة في الشبكة
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `<img src="${dataUrl}">`;
                output.appendChild(card);
                
                // تحميل الصورة تلقائياً
                downloadFile(dataUrl, `furniture-${i + 1}.webp`);
                
                // تأخير بسيط لتجنب حظر التحميل من المتصفح
                await new Promise(r => setTimeout(r, 200));
            }
        }

        document.getElementById('generateBtn').addEventListener('click', generate);
    </script>
</body>
</html>
